name: Windows Build

on:
  push:
    branches: [ "windows-dev" ]
  pull_request:
    branches: [ "windows-dev" ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Install vcpkg
      run: |
        git clone https://github.com/Microsoft/vcpkg.git
        .\vcpkg\bootstrap-vcpkg.bat
        .\vcpkg\vcpkg integrate install

    - name: Install dependencies
      run: |
        vcpkg install curl:x64-windows
        vcpkg install yaml-cpp:x64-windows
        vcpkg install nlohmann-json:x64-windows

    - name: Build sherpa-onnx
      run: |
        cd dep/sherpa-onnx
        mkdir build
        cd build
        cmake -G "Visual Studio 17 2022" -A x64 ^
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} ^
          -DSHERPA_ONNX_ENABLE_PYTHON=OFF ^
          -DSHERPA_ONNX_ENABLE_TESTS=OFF ^
          -DSHERPA_ONNX_ENABLE_CHECK=OFF ^
          -DCMAKE_INSTALL_PREFIX=install ^
          ..
        cmake --build . --config ${{env.BUILD_TYPE}}
        cmake --install . --config ${{env.BUILD_TYPE}}
        cd ../../..

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake -G "Visual Studio 17 2022" -A x64 ^
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} ^
          -DCMAKE_TOOLCHAIN_FILE=${{github.workspace}}/vcpkg/scripts/buildsystems/vcpkg.cmake ^
          -DCMAKE_PREFIX_PATH="${{github.workspace}}/vcpkg/installed/x64-windows;${{github.workspace}}/dep/sherpa-onnx/build/install" ^
          ..

    - name: Build
      run: |
        cd build
        cmake --build . --config ${{env.BUILD_TYPE}}

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: voice-assistant-windows
        path: |
          build/src/Release/voice_assistant.exe
          ${{github.workspace}}/vcpkg/installed/x64-windows/bin/*.dll
          ${{github.workspace}}/dep/sherpa-onnx/build/install/bin/*.dll 