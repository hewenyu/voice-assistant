name: Windows Build

on:
  push:
    branches: [ "windows-dev" ]
  pull_request:
    branches: [ "windows-dev" ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: true
        fetch-depth: 0

    - name: Initialize submodules
      run: |
        git submodule update --init --recursive

    - name: Setup Windows SDK
      shell: powershell
      run: |
        $WindowsSDKVersion = (Get-ItemProperty -Path 'HKLM:\SOFTWARE\WOW6432Node\Microsoft\Microsoft SDKs\Windows\v10.0').ProductVersion
        $WindowsSDKDir = (Get-ItemProperty -Path 'HKLM:\SOFTWARE\WOW6432Node\Microsoft\Microsoft SDKs\Windows\v10.0').InstallationFolder
        echo "WindowsSDKVersion=$WindowsSDKVersion.0" >> $env:GITHUB_ENV
        echo "WindowsSdkDir=$WindowsSDKDir" >> $env:GITHUB_ENV

    - name: Install vcpkg
      run: |
        git clone https://github.com/Microsoft/vcpkg.git
        ./vcpkg/bootstrap-vcpkg.bat
        ./vcpkg/vcpkg integrate install

    - name: Install dependencies
      run: |
        ./vcpkg/vcpkg install curl:x64-windows
        ./vcpkg/vcpkg install yaml-cpp:x64-windows
        ./vcpkg/vcpkg install nlohmann-json:x64-windows

    - name: Build sherpa-onnx
      shell: cmd
      run: |
        cd dep\sherpa-onnx
        mkdir build
        cd build
        cmake -G "Visual Studio 17 2022" -A x64 ^
          -DCMAKE_BUILD_TYPE=%BUILD_TYPE% ^
          -DSHERPA_ONNX_ENABLE_PYTHON=OFF ^
          -DSHERPA_ONNX_ENABLE_TESTS=OFF ^
          -DSHERPA_ONNX_ENABLE_CHECK=OFF ^
          -DCMAKE_INSTALL_PREFIX=install ^
          ..
        cmake --build . --config %BUILD_TYPE%
        cmake --install . --config %BUILD_TYPE%
        cd ..\..\..

    - name: Configure CMake
      shell: cmd
      run: |
        mkdir build
        cd build
        cmake -G "Visual Studio 17 2022" -A x64 ^
          -DCMAKE_BUILD_TYPE=%BUILD_TYPE% ^
          -DCMAKE_TOOLCHAIN_FILE=%GITHUB_WORKSPACE%\vcpkg\scripts\buildsystems\vcpkg.cmake ^
          -DCMAKE_PREFIX_PATH="%GITHUB_WORKSPACE%\vcpkg\installed\x64-windows;%GITHUB_WORKSPACE%\dep\sherpa-onnx\build\install" ^
          ..

    - name: Build
      shell: cmd
      run: |
        cd build
        cmake --build . --config %BUILD_TYPE%

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: voice-assistant-windows
        path: |
          build/src/Release/voice_assistant.exe
          ${{github.workspace}}/vcpkg/installed/x64-windows/bin/*.dll
          ${{github.workspace}}/dep/sherpa-onnx/build/install/bin/*.dll 